id: xiao-chi
category: food
fork_type: F

display:
  taiwan: 小吃
  china: 小吃

english: street food / snacks

etymology:
  origin: 漢語固有詞，兩岸用詞相同，但「小吃」在台灣的文化地位與國族認同連結更為深厚。
  taiwan_path: 台灣「小吃」是飲食文化核心，以夜市小吃、廟口小吃為代表，是台灣觀光的重要吸引力。
  china_path: 中國「小吃」以地方特色為主，與台灣夜市文化形態不同。
  fork_point: "~1949"
  fork_cause: 同詞不同文化內涵，台灣小吃與國族認同、觀光文化高度綁定。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣「小吃文化」已成國際觀光重點，CNN、米其林等國際媒體多次報導，「台灣小吃」幾乎是台灣飲食在國際上的代名詞。

sources:
  - "觀光署台灣夜市與小吃文化推廣資料"

