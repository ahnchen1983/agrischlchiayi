id: wireless-network
category: tech
fork_type: B

display:
  taiwan: 無線網路
  china: 無線網絡 / WiFi

english: wireless network / Wi-Fi

etymology:
  origin: 台灣稱「無線網路」，中國稱「無線網絡」，差別在「路」vs「絡」的用字
  taiwan_path: 台灣使用「網路」（路徑之意），「無線網路」為官方正式用詞，口語常說「WiFi」
  china_path: 中國使用「網絡」（網狀系統之意），「無線網絡」或直接說「WiFi」「WLAN」
  fork_point: "~1999"
  fork_cause: 台灣選「路」字，中國選「絡」字，是兩岸翻譯internet/network的系統性差異

usage:
  taiwan_formal: true
  taiwan_casual: false
  exceptions: "口語多說「WiFi」，「無線網路」較書面"

status: stable
notes: |
  「網路」（台灣）vs「網絡」（中國）是最具代表性的兩岸科技翻譯差異，涵蓋所有「network」相關詞彙。
  口語中兩岸均說「WiFi」，差異消弭，但正式文件仍有「網路」/「網絡」之別。

sources:
  - "NCC：無線網路頻率分配"
  - "教育部國語辭典：無線網路"

added: "2026-03-30"
updated: "2026-03-30"
