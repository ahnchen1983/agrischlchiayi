id: xin-yong-ka
category: business
fork_type: F

display:
  taiwan: 信用卡
  china: 信用卡

english: credit card

etymology:
  origin: 漢語固有詞，兩岸用詞完全相同（繁簡字差異），但台灣信用卡文化高度發達，擁有豐富的回饋生態系。
  taiwan_path: 台灣「信用卡」文化以「刷卡回饋」為核心，「找最高回饋的信用卡」是台灣消費者的重要行為，台灣信用卡發卡量和使用率在亞洲名列前段。
  china_path: 中國信用卡市場近年因支付寶、微信支付的崛起而受到衝擊，「信用卡」使用率相對低於行動支付。
  fork_point: "~1970s"
  fork_cause: 繁簡字差異，台灣信用卡回饋文化極為發達，中國行動支付更為主流。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣「信用卡比較」「最高回饋信用卡」是台灣財經媒體和消費者論壇的長青話題，反映了台灣消費者對理財效率的高度重視。

sources:
  - "金融監理委員會（台灣）信用卡統計"

