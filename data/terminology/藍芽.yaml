id: bluetooth
category: tech
fork_type: B

display:
  taiwan: 藍芽
  china: 藍牙

english: Bluetooth

etymology:
  origin: Bluetooth源自丹麥維京王Harald Bluetooth，台灣譯「藍芽」，中國譯「藍牙」
  taiwan_path: 台灣官方和業界使用「藍芽」，「藍芽耳機」「藍芽喇叭」為常見組合詞
  china_path: 中國使用「藍牙」，「牙」字源於對「tooth」的漢譯
  fork_point: "~1998"
  fork_cause: 「tooth」的翻譯：台灣取「芽」（形似植物新芽，隱喻新生技術），中國取「牙」（直譯牙齒）

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  「藍芽」（台灣）vs「藍牙」（中國）是兩岸科技翻譯差異中最廣為人知的例子之一。
  「tooth」→「芽」vs「牙」，體現了兩岸翻譯哲學的不同路徑。

sources:
  - "NCC：藍芽技術規範"
  - "教育部國語辭典：藍芽"

added: "2026-03-30"
updated: "2026-03-30"
