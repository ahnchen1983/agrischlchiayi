id: chou-dou-fu
category: food
fork_type: F

display:
  taiwan: 臭豆腐
  china: 臭豆腐

english: stinky tofu

etymology:
  origin: 漢語固有詞，以氣味命名的發酵豆腐，兩岸名稱相同，但製作工藝與食用方式有顯著差異。
  taiwan_path: 台灣臭豆腐以油炸為主流，搭配台式泡菜與甜辣醬，基隆廟口、深坑臭豆腐等地域品牌享譽全台。
  china_path: 中國有長沙灰色臭豆腐、紹興醬色臭豆腐等多種地方版本，工藝與台灣版本不同。
  fork_point: "~1895前"
  fork_cause: 同名不同做法，兩岸飲食文化並行發展後形成在地化差異。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣油炸臭豆腐搭配台式泡菜是獨特的在地化版本，「深坑臭豆腐」已成為台灣觀光美食地圖的重要景點。

sources:
  - "觀光署台灣小吃文化資源"

