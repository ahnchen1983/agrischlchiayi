id: tu-di-gong
category: culture
fork_type: F

display:
  taiwan: 土地公
  china: 土地公 / 土地神 / 福德正神

english: Tu Di Gong (Earth God / God of the Land)

etymology:
  origin: 漢族傳統民間信仰，守護土地與財富的神明，兩岸共有的信仰
  taiwan_path: 台灣土地公廟（福德祠）密度極高，每個社區幾乎都有土地公廟，農曆二月二日為土地公生日
  china_path: 中國同樣有土地公信仰，但在文化大革命後傳統廟宇被大量破壞，現正逐步恢復
  fork_point: "~明清"
  fork_cause: 詞彙相同，但台灣土地公信仰保存更完整，且融合了台灣本土特色

usage:
  taiwan_formal: false
  taiwan_casual: true
  exceptions: "正式稱「福德正神」，口語說「土地公」"

status: stable
notes: |
  台灣土地公廟密度為全球最高，台灣人說「土地公保庇」是日常祈福語。
  土地公形象通常是白鬍老公公，手持拐杖，在台灣文化中象徵親切的在地守護神。

sources:
  - "文化部：台灣民間信仰——土地公"
  - "教育部國語辭典：土地公"

