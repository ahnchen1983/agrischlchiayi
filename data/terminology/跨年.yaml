id: new-year-countdown
category: culture
fork_type: F

display:
  taiwan: 跨年
  china: 跨年 / 元旦晚會

english: New Year's Eve countdown celebration

etymology:
  origin: 「跨年」指跨越新舊年份交替時刻的慶祝活動，台灣使用頻率極高
  taiwan_path: 台灣「跨年晚會」是重要文化事件，台北101跨年煙火是全球指標性慶典，各縣市均有跨年活動
  china_path: 中國使用「跨年」，但農曆春節（過年）的重要性遠高於元旦跨年，「元旦晚會」較正式
  fork_point: "~1990s"
  fork_cause: 詞彙相同，但西洋元旦跨年在台灣的文化地位相對高於中國（中國更重視農曆年）

usage:
  taiwan_formal: false
  taiwan_casual: true
  exceptions: "正式稱「元旦跨年活動」，口語說「跨年」"

status: stable
notes: |
  台灣「跨年」文化在1990年代隨演唱會興起而普及，台北101跨年煙火已是台灣對外的重要文化符號。
  中國「跨年」也盛行，但農曆除夕夜的重要性仍遠超元旦跨年。

sources:
  - "台北市政府：台北101跨年活動"
  - "教育部國語辭典：跨年"

