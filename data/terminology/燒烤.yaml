id: shao-kao
category: food
fork_type: F

display:
  taiwan: 燒烤
  china: 燒烤

english: BBQ / grilled food

etymology:
  origin: 漢語固有詞，兩岸用詞相同，但台灣「燒烤」文化形成了獨特的中秋節家庭炭烤形態。
  taiwan_path: 台灣中秋節烤肉習俗源自1980年代萬家香醬油廣告帶動，「中秋烤肉」已成台灣最獨特的現代節慶習俗。
  china_path: 中國燒烤以東北、新疆風格為代表，串烤（羊肉串）文化強烈，與台灣家庭式中秋烤肉形態不同。
  fork_point: "~1980s"
  fork_cause: 同詞不同文化形態，台灣中秋烤肉是本地廣告效應的產物，屬於當代台灣文化發明。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣中秋節「全民烤肉」文化完全是廣告造就的現代傳統，已取代賞月成為台灣中秋最重要的習俗。

sources:
  - "《聯合報》台灣中秋烤肉文化起源調查"

