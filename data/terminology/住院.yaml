id: zhu-yuan
category: medical
fork_type: F

display:
  taiwan: 住院
  china: 住院

english: hospitalization / hospital admission

etymology:
  origin: 漢語固有詞，兩岸用詞完全相同（繁簡字差異：院/院），指患者住於醫院接受治療。
  taiwan_path: 台灣住院費用在全民健保制度下大幅補助，住院費用相對可負擔，「住院」是台灣人對重大疾病治療的日常表述。
  china_path: 中國住院費用由基本醫保部分負擔，自費比例因地區、醫院等級而異，費用負擔較台灣重。
  fork_point: "~1949"
  fork_cause: 繁簡字差異，台灣全民健保制度使住院費用更可負擔。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣全民健保使住院費用相對低廉，「陪病文化」（家屬輪流陪同住院病患）是台灣醫療文化的重要特色，反映台灣重視家庭照顧的社會價值。

sources:
  - "衛生福利部全民健康保險署住院給付規定"

added: "2026-03-30"
updated: "2026-03-30"
