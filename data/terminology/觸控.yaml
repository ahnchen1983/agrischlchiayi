id: touch-control
category: tech
fork_type: B

display:
  taiwan: 觸控
  china: 觸摸 / 觸控

english: touch (as in touchscreen)

etymology:
  origin: 台灣偏用「觸控」（控制）；中國偏用「觸摸」（觸碰感覺），均為touch的漢譯
  taiwan_path: 台灣「觸控螢幕」「觸控板」「觸控筆」為標準用法，強調控制功能
  china_path: 中國「觸摸屏」「觸摸板」更常見，強調觸摸動作本身
  fork_point: "~2007"
  fork_cause: 翻譯策略不同：台灣強調「控制」面向，中國強調「觸摸」動作

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  「觸控」vs「觸摸」是台灣和中國科技翻譯的系統性差異之一。
  台灣「觸控螢幕」（touchscreen）、中國「觸摸屏」，指相同設備但用字不同。

sources:
  - "NCC：觸控裝置技術規範"
  - "教育部國語辭典：觸控"

added: "2026-03-30"
updated: "2026-03-30"
