id: ba-jia-jiang
category: culture
fork_type: A

display:
  taiwan: 八家將
  china: （無對應概念）

english: Eight Generals (Taiwanese folk religion ritual dance troupe)

etymology:
  origin: 台灣民間宗教的陣頭文化，源自台南府城城隍廟，以八位神將為核心的儀式表演
  taiwan_path: 八家將起源於台南，代表城隍爺的部將，成員身著特定服裝、臉譜，執行驅邪儀式
  china_path: 中國大陸無對應的八家將文化，雖有類似的地方神明信仰，但無此特定儀式形式
  fork_point: "~清代"
  fork_cause: 台灣本土民間宗教文化在移民過程中獨立發展，形成台灣特有的陣頭形式

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  八家將是台灣最具代表性的民俗文化之一，也是陣頭文化的核心。
  台灣青年參與八家將已成為在地文化認同的重要象徵，相關紀錄片（如《陣頭》電影）廣受關注。

sources:
  - "文化部：台灣民俗文化資產——八家將"
  - "台南市政府文化局：八家將文化保存"

