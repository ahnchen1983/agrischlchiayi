id: lucky-money
category: culture
fork_type: F

display:
  taiwan: 壓歲錢
  china: 壓歲錢

english: lucky money (New Year monetary gift to children)

etymology:
  origin: 「壓歲錢」指長輩給晚輩的春節紅包，取「壓」（克制）歲（邪氣）之意，傳統漢族習俗
  taiwan_path: 台灣春節長輩給小孩壓歲錢是重要傳統，金額視關係親疏而定，裝入紅包袋
  china_path: 中國同樣有壓歲錢傳統，金額隨經濟發展水準逐年提高，微信紅包部分取代實體
  fork_point: "~明清"
  fork_cause: 詞彙和傳統完全相同，差異在金額水準和數位化程度

usage:
  taiwan_formal: false
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  兩岸均使用「壓歲錢」，文化傳統完全相同。
  台灣小孩收到壓歲錢後，父母常「代為保管」，成為台灣文化的小幽默。

sources:
  - "教育部國語辭典：壓歲錢"
  - "文化部：台灣春節民俗傳統"

