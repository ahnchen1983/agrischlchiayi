id: red-envelope
category: culture
fork_type: F

display:
  taiwan: 紅包
  china: 紅包 / 利是（廣東）

english: red envelope (monetary gift)

etymology:
  origin: 「紅包」指裝有現金的紅色封袋，是華人文化贈禮傳統，兩岸均使用
  taiwan_path: 台灣紅包文化盛行，婚禮、生日、春節均有包紅包習俗，金額有不成文慣例
  china_path: 中國同樣使用「紅包」，微信紅包數位化後使實體/數位並行，農曆年前「搶紅包」成全民活動
  fork_point: "~明清"
  fork_cause: 詞彙相同，但數位化（微信紅包）使中國紅包文化發展出新的形式

usage:
  taiwan_formal: false
  taiwan_casual: true
  exceptions: "正式場合稱「禮金」，口語說「紅包」"

status: stable
notes: |
  兩岸均使用「紅包」，差異在數位化程度。台灣「Line Points」等數位紅包發展中，但實體紅包仍主流。
  中國微信紅包已成除夕夜重要儀式，2015年春晚後普及率爆炸性成長。

sources:
  - "教育部國語辭典：紅包"
  - "文化部：台灣春節民俗——壓歲錢與紅包"

