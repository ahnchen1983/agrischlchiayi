id: ji-jin
category: business
fork_type: F

display:
  taiwan: 基金
  china: 基金

english: fund / mutual fund

etymology:
  origin: 漢語固有詞，兩岸用詞完全相同（繁簡字差異），指集合投資的理財工具。
  taiwan_path: 台灣「基金」以共同基金（投資信託）為主流，「買台股基金」「買海外基金」是台灣民眾常見的投資方式，投信公司（投資信託公司）是台灣基金市場的主要機構。
  china_path: 中國「基金」市場以公募基金（公開發行）為主，「基金公司」管理的股票基金和債券基金是主流，「公募基金規模」是中國資本市場重要指標。
  fork_point: "~1949"
  fork_cause: 繁簡字差異，兩岸基金市場結構和監管框架有所不同。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣基金投資文化成熟，「定期定額買基金」是台灣中產階級的主流理財方式，也是台灣銀行和投信業者的重要商業模式。

sources:
  - "金融監理委員會（台灣）投信投顧統計"

