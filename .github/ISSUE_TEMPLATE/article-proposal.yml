name: 📝 文章提案 / Article Proposal
description: 提議一篇新農業知識文章
title: "[Article] "
labels: ["content"]
body:
  - type: dropdown
    id: category
    attributes:
      label: 分類 / Category
      options:
        - Agri-Basics (農業基礎入門)
        - Agri-Advanced (農業進階實務)
        - Farm-Management (農場經營管理)
        - Crop-Production (作物生產技術)
        - Facility-Farming (設施農業)
        - Smart-Farming (智慧農業)
        - Agri-Marketing (農產品銷售)
        - Grants-Planning (計畫撰寫補助)
        - Field-Visits (場域交流觀摩)
        - Livestock-Health (畜牧健康)
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: 文章內容 / Article Content
      description: |
        可以是完整文章（含 frontmatter），也可以只是主題提案。
        完整文章格式請參考 [CONTRIBUTING.md](https://github.com/ahnchen1983/agrischlchiayi/blob/main/CONTRIBUTING.md)
      placeholder: |
        ---
        title: "文章標題"
        description: "一句話描述"
        date: 2026-01-01
        tags: ["國本學堂", "tag2"]
        level: "初階"
        crop: ["水稻"]
        tech: ["土壤檢測"]
        ---

        # 文章標題

        ## 摘要
        ...
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: 參考資料 / Sources
      description: 請提供可查證的資料來源
      placeholder: "- https://example.com/source1\n- 課程講義/書籍名稱"
    validations:
      required: false
